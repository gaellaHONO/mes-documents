site_name: Mes Documents étudiants
theme:
  name: material
  palette:
    - media: (prefers-color-scheme: light)
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
features:
  - navigation.tabs
  - search.highlight
  - search.suggest